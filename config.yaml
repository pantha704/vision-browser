# Default config - copy to ~/.config/vision-browser/config.yaml or set env vars
# NOTE: API keys are loaded from environment variables only (GROQ_API_KEY, NVIDIA_API_KEY).
# Never commit API keys to version control.
vision:
  # Primary: NVIDIA NIM Llama 3.2 90B Vision (API Catalog - NVCF)
  provider: "nim"
  nim_function_id: "24e0c62b-f7d0-44ba-8012-012c2a1aaf31"
  nim_max_tokens: 1024

  # Fallback: Groq (if you have vision access)
  fallback_provider: "groq"
  groq_model: "llama-3.2-11b-vision"
  groq_max_tokens: 1024

browser:
  # Default: Launch Playwright's own Chromium (recommended — most reliable)
  # Playwright Chromium has extra automation patches, no GPU crashes,
  # no extension interference, and works perfectly in headless mode.
  #
  # To use Brave instead (for authenticated sessions):
  #   1. Start Brave: brave-browser --remote-debugging-port=9222 --no-sandbox --disable-gpu &
  #   2. Set cdp_url below, or use --brave CLI flag
  cdp_url: null
  viewport: [1280, 720]
  timeout_ms: 30000
  session_name: ""  # Set to persist cookies between runs (e.g. "default")

desktop:
  # Fallback for non-browser apps
  screenshot_cmd: "scrot"
  click_cmd: "xdotool mousemove {x} {y} click 1"
  type_cmd: "xdotool type --delay 20 -- {text}"

orchestrator:
  max_turns: 20
  batch_actions: true  # Plan multiple actions per turn
  diff_mode: false  # Not yet implemented
  max_prompt_elements: 30  # Max elements to show in prompt
